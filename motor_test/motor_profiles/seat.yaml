# 座椅电机 (Seat Motor) — 无负载
# ============================================
# 切换电机: pytest motor_test/ --motor-profile seat

motor_name: "座椅电机 (无负载)"
motor_id: seat

# ── 电气模型参数 ──
electrical:
  pole_pairs: 4
  rs_ohm: 0.05
  ls_h: 0.00045158
  flux_linkage_vs: 0.003413
  bemf_ab_pp_v: 28.6
  bemf_elec_freq_hz: 385.0

# ── 运行范围 ──
limits:
  max_rpm: 5500
  min_rpm: 300
  default_target_rpm: 2000
  max_iq_a: 10.0
  default_iq_a: 0.5

# ── 启动参数 ──
startup:
  align_current_a: 2.0
  open_loop_iq_a: 3.0
  align_time_ms: 200
  open_loop_ramp_ms: 500
  timeout_ms: 1000
  max_retries: 0

# ── 控制器增益 ──
control:
  current_loop_bw_hz: 2000.0
  speed_kp: 0.003
  speed_ki: 0.002
  speed_ramp_rpm_s: 2000.0
  observer_gain: 0.8e6
  pll_kp: 200.0
  pll_ki: 10000.0

# ── 测试用例参数 ──
test:
  # 启停测试用 RPM
  start_rpm: 2000
  # 速度阶跃测试对
  speed_step_pairs:
    - [1000, 3000]
    - [2000, 4000]
    - [3000, 5000]
    - [4000, 2000]
  # 判定阈值
  overshoot_limit_pct: 15.0
  rise_time_limit_s: 1.5
  settle_error_limit_pct: 8.0
  # ── 测试时序 (座椅电机惯量小、响应快) ──
  start_timeout_s: 5.0
  settle_timeout_s: 3.0
  capture_pre_s: 0.5
  capture_post_s: 3.0
  capture_interval_s: 0.005
  stop_timeout_s: 3.0
  inter_pair_delay_s: 0.5
  # 启停循环间歇
  start_stop_settle_s: 1.0
  # endurance
  endurance_duration_min: 5
  # auto-tuner 参数
  tune_base_rpm: 2000
  tune_step_rpm: 3000
  tune_kp_range: [0.0005, 0.01]
  tune_ki_range: [0.0005, 0.01]
